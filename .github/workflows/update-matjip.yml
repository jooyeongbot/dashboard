name: 맛집 데이터 주간 갱신

on:
  schedule:
    - cron: '0 0 * * 1'   # 매주 월요일 오전 9시 KST (UTC 0시)
  workflow_dispatch:        # GitHub 웹에서 수동 실행도 가능

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install requests

      - name: 맛집 데이터 갱신 스크립트 실행
        run: python scripts/update_matjip.py
        env:
          KAKAO_API_KEY: ${{ secrets.KAKAO_API_KEY }}

      - name: 변경사항 자동 커밋 & 푸시
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: 맛집 평점/리뷰 주간 자동 갱신"
          file_pattern: 'index.html'
